<!doctype html>
<html lang="id" class="h-full">

<head>
  <script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendaftaran Siswa Baru</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .back-btn {
      transition: all .3s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
    }

    .upload-zone {
      border: 2px dashed #94a3b8;
      transition: all 0.3s;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .toast {
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
</head>

<body class="h-full">
  <div id="app" class="h-full w-full overflow-auto bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100">
    <div class="max-w-3xl mx-auto px-4 py-8">
      <div class="flex justify-start mb-6">
        <a href="index.html"
          class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-white shadow-md hover:shadow-lg border border-slate-200 text-slate-700 font-semibold transition-all duration-300">
          ← Kembali ke Beranda
        </a>
      </div>

      <div class="text-center mb-8">

        <h1 id="form-title" class="text-2xl md:text-3xl font-extrabold text-slate-800">
          Pendaftaran Siswa Baru
        </h1>

        <img src="OIP.png" alt="Logo Daar El-Hikam"
          class="w-32 h-32 md:w-40 md:h-40 mx-auto object-contain drop-shadow-lg mb-4">

        <p id="school-name" class="text-slate-500 mt-2 text-lg font-medium">
          MTS / MA Daar El-Hikam
        </p>
        
      </div>

    </div><form id="reg-form" class="bg-white rounded-2xl shadow-xl p-6 md:p-8 space-y-5"><div>
        <P class="block text-sm font-600 text-slate-700 mb-1">Silakan isi formulir pendaftaran di bawah ini:</P>
        <label for="nama" class="block text-sm font-600 text-slate-700 mb-1">Nama Lengkap</label> <input type="text"
          id="nama" required
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label for="tempat" class="block text-sm font-600 text-slate-700 mb-1">Tempat Lahir</label> <input
            type="text" id="tempat" required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
        </div>
        <div><label for="tgl" class="block text-sm font-600 text-slate-700 mb-1">Tanggal Lahir</label> <input
            type="date" id="tgl" required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
        </div>
      </div><div><label class="block text-sm font-600 text-slate-700 mb-1">Jenis Kelamin</label>
        <div class="flex gap-4"><label class="flex items-center gap-2 cursor-pointer"> <input type="radio" name="gender"
              value="Laki-laki" required class="w-4 h-4 text-blue-600"> <span class="text-slate-600">Laki-laki</span>
          </label> <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="gender" value="Perempuan" class="w-4 h-4 text-blue-600"> <span
              class="text-slate-600">Perempuan</span> </label>
        </div>
      </div><div><label for="asal" class="block text-sm font-600 text-slate-700 mb-1">Asal Sekolah</label> <input type="text"
          id="asal" required
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div><div><label for="ortu" class="block text-sm font-600 text-slate-700 mb-1">Nama Orang Tua/Wali</label> <input
          type="text" id="ortu" required
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div><div><label for="telp" class="block text-sm font-600 text-slate-700 mb-1">No. Telepon</label> <input type="tel"
          id="telp" required
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      </div><div><label for="alamat" class="block text-sm font-600 text-slate-700 mb-1">Alamat</label> <textarea id="alamat"
          rows="3" required
          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition resize-none"></textarea>
      </div><div><label class="block text-sm font-600 text-slate-700 mb-1">Upload Foto Ijazah / SKL</label>
        <div id="upload-zone" class="upload-zone rounded-xl p-6 text-center cursor-pointer relative"><input type="file"
            id="file-input" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
          <div id="upload-placeholder"><i data-lucide="upload-cloud" class="w-10 h-10 text-slate-400 mx-auto mb-2"></i>
            <p class="text-slate-500 text-sm">Klik atau seret foto Ijazah/SKL ke sini</p>
            <p class="text-slate-400 text-xs mt-1">Format: JPG, PNG (maks 5MB)</p>
          </div>
          <div id="upload-preview" class="hidden"><img id="preview-img" class="max-h-48 mx-auto rounded-lg shadow"
              alt="Preview dokumen">
            <p id="file-name" class="text-sm text-slate-600 mt-2"></p><button type="button" id="remove-file"
              class="mt-2 text-xs text-red-500 hover:text-red-700 font-medium">Hapus file</button>
          </div>
        </div>
        <div class="mt-2"><label class="block text-xs font-500 text-slate-500 mb-1">Jenis Dokumen</label> <select
            id="jenis-doc" required
            class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">-- Pilih --</option>
            <option value="Ijazah">Ijazah</option>
            <option value="SKL">Surat Keterangan Lulus (SKL)</option>
          </select>
        </div>
      </div><button type="submit" id="save-btn"
        class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-700 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2">
        <i data-lucide="save" class="w-5 h-5"></i> <span id="btn-text">Simpan Pendaftaran</span> </button>
    </form><div id="toast"
      class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-xl shadow-2xl toast font-medium">
    </div>
  </div>
  </div>
  <script>
    // Element SDK
    const defaultConfig = {
      form_title: 'Pendaftaran Siswa Baru',
      school_name: 'SMA Negeri 1',
      background_color: '#f0f5ff',
      surface_color: '#ffffff',
      text_color: '#1e293b',
      primary_action: '#2563eb',
      secondary_action: '#4f46e5',
      font_family: 'Plus Jakarta Sans',
      font_size: 16
    };

    function applyConfig(config) {
      const t = (k) => config[k] || defaultConfig[k];
      document.getElementById('form-title').textContent = t('form_title');
      document.getElementById('school-name').textContent = t('school_name');
      document.getElementById('app').style.background = `linear-gradient(135deg, ${t('background_color')}22, ${t('background_color')})`;
      document.querySelector('form').style.backgroundColor = t('surface_color');
      document.getElementById('form-title').style.color = t('text_color');
      const btn = document.getElementById('save-btn');
      btn.style.background = `linear-gradient(to right, ${t('primary_action')}, ${t('secondary_action')})`;
      document.body.style.fontFamily = `${t('font_family')}, sans-serif`;
      document.body.style.fontSize = `${t('font_size')}px`;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['form_title', config.form_title || defaultConfig.form_title],
        ['school_name', config.school_name || defaultConfig.school_name]
      ])
    });

    // Data SDK
    let recordCount = 0;
    window.dataSdk.init({ onDataChanged(data) { recordCount = data.length; } });

    // File upload
    const fileInput = document.getElementById('file-input');
    const uploadZone = document.getElementById('upload-zone');
    const placeholder = document.getElementById('upload-placeholder');
    const preview = document.getElementById('upload-preview');
    const previewImg = document.getElementById('preview-img');
    const fileName = document.getElementById('file-name');
    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { showToast('File terlalu besar (maks 5MB)', true); return; }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (ev) => {
        previewImg.src = ev.target.result;
        fileName.textContent = file.name;
        placeholder.classList.add('hidden');
        preview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('remove-file').addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      preview.classList.add('hidden');
      placeholder.classList.remove('hidden');
    });

    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); fileInput.files = e.dataTransfer.files; fileInput.dispatchEvent(new Event('change')); });

    // Form submit
    document.getElementById('reg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedFile) { showToast('Harap upload foto Ijazah/SKL', true); return; }
      if (recordCount >= 999) { showToast('Batas pendaftaran tercapai', true); return; }

      const btn = document.getElementById('save-btn');
      const btnText = document.getElementById('btn-text');
      btn.disabled = true;

      // 1. PROSES OTOMATIS UPLOAD FOTO KE CLOUD STORAGE (TMPFILES)
      btnText.textContent = 'Mengupload berkas foto...';
      let directImageUrl = "";
      try {
        const formData = new FormData();
        formData.append("file", selectedFile);

        const uploadResponse = await fetch("https://tmpfiles.org/api/v1/upload", {
          method: "POST",
          body: formData
        });
        const uploadData = await uploadResponse.json();
        
        if(uploadData.status === "success") {
          // Mengubah menjadi direct link download agar Fonnte dapat menarik gambarnya
          directImageUrl = uploadData.data.url.replace("https://tmpfiles.org/", "https://tmpfiles.org/dl/");
        } else {
          throw new Error("Gagal upload");
        }
      } catch (err) {
        btn.disabled = false;
        btnText.textContent = 'Simpan Pendaftaran';
        showToast('Gagal memproses upload foto berkas, silakan coba lagi.', true);
        return;
      }

      // 2. PROSES SIMPAN KE DATABASE BAWAAN (DATA SDK)
      btnText.textContent = 'Menyimpan data...';
      const gender = document.querySelector('input[name="gender"]:checked');
      const nama = document.getElementById('nama').value;
      const tempat = document.getElementById('tempat').value;
      const tgl = document.getElementById('tgl').value;
      const asal = document.getElementById('asal').value;
      const ortu = document.getElementById('ortu').value;
      const telp = document.getElementById('telp').value;
      const alamat = document.getElementById('alamat').value;
      const doc = document.getElementById('jenis-doc').value;

      const result = await window.dataSdk.create({
        nama_lengkap: nama,
        tempat_lahir: tempat,
        tanggal_lahir: tgl,
        jenis_kelamin: gender ? gender.value : '',
        asal_sekolah: asal,
        nama_ortu: ortu,
        no_telepon: telp,
        alamat: alamat,
        jenis_dokumen: doc,
        foto_link_online: directImageUrl, // Link foto online ikut tersimpan di database
        submitted_at: new Date().toISOString()
      });

      if (!result.isOk) {
        btn.disabled = false;
        btnText.textContent = 'Simpan Pendaftaran';
        showToast('Gagal menyimpan data ke database sistem.', true);
        return;
      }

      // 3. PROSES MENERUSKAN NOTIFIKASI + LINK FOTO KE WHATSAPP (FONNTE)
      btnText.textContent = 'Meneruskan ke WhatsApp...';
      
      // ⚠️ PENTING: Ganti nomor di bawah ini dengan Nomor WA biasa atau ID Grup WA panitia PPDB milikmu!
      const nomorTujuan = "120363424784245750@g.us"; 
      
      const pesanWA = `*PENDAFTARAN SANTRI BARU (PPDB)*\n\n` +
                      `• Nama Lengkap: ${nama}\n` +
                      `• TTL: ${tempat}, ${tgl}\n` +
                      `• Jenis Kelamin: ${gender ? gender.value : ''}\n` +
                      `• Asal Sekolah: ${asal}\n` +
                      `• Orang Tua/Wali: ${ortu}\n` +
                      `• No. HP/WA: ${telp}\n` +
                      `• Alamat: ${alamat}\n` +
                      `• Lampiran Berkas: ${doc}\n\n` +
                      `Waktu Input: ${new Date().toLocaleString('id-ID')} WIB`;

      try {
        const response = await fetch('/.netlify/functions/kirim-wa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target: nomorTujuan, pesan: pesanWA, urlGambar: directImageUrl })
        });
        
        const data = await response.json();
        
        btn.disabled = false;
        btnText.textContent = 'Simpan Pendaftaran';

        if (data.success) {
          showToast('Pendaftaran & foto ijazah berhasil terkirim langsung ke WhatsApp! ✅');
          e.target.reset();
          selectedFile = null;
          preview.classList.add('hidden');
          placeholder.classList.remove('hidden');
        } else {
          showToast('Data tersimpan di sistem, tapi kirim WA gagal: ' + data.message, true);
        }
      } catch (error) {
        btn.disabled = false;
        btnText.textContent = 'Simpan Pendaftaran';
        showToast('Data tersimpan di sistem, tapi koneksi ke fungsi WA terputus.', true);
      }
    });

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-2xl toast font-medium ${isError ? 'bg-red-600' : 'bg-emerald-600'} text-white`;
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    lucide.createIcons();
  </script>

</body>

</html>
